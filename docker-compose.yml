# ContractIQ local development stack (SRS Section 6).
# Brings up the FastAPI backend and the Next.js frontend. The MCP tools are
# mounted inside the API at /mcp; run the native stdio MCP server separately
# with `python -m contractiq.mcp_server.server` if an MCP host needs it.
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      API_PORT: "8000"
    command: uvicorn contractiq.api.main:app --host 0.0.0.0 --port 8000

  frontend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - ./frontend:/app
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_BASE: "http://api:8000"
    command: sh -c "npm install && npm run dev"
    depends_on:
      - api
